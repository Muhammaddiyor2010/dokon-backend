services:
  api:
    build:
      context: .
    container_name: online-market-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - market_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  market_data:
